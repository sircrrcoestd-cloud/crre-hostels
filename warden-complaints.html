<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hostel Complaints | Warden</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="crrengglogo.png" type="image/png" />

<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>

<link rel="stylesheet"
 href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.20/dist/sweetalert2.min.css"/>

<style>
/* ===== SAME ROOT VARIABLES (copied from your file) ===== */
:root {
  --primary-color: #0b2e59;
  --secondary-color: #2c6e91;
  --accent-color: #f7a048;
  --background-dark: #f0f2f5;
  --background-light: #ffffff;
  --text-dark: #333;
  --text-light: #fff;
  --card-shadow: 0 4px 15px rgba(0,0,0,0.08);
  --border-radius-lg: 16px;
  --border-radius-md: 10px;
}

body {
  margin:0;
  font-family: 'Segoe UI';
  background: var(--background-dark);
}

.container {
  display:flex;
  min-height:100vh;
}

/* ===== SIDEBAR SAME ===== */
.sidebar {
  width:280px;
  background:var(--primary-color);
  padding:30px 20px;
  position:fixed;
  top:0; bottom:0; left:0;
  color:white;
}

.sidebar h2 {
  margin:20px;
}

.menu li {
  list-style:none;
  margin-bottom:10px;
}

.menu li a {
  color:white;
  display:flex;
  gap:10px;
  padding:12px;
  border-radius:8px;
}

.menu li.active a,
.menu li a:hover {
  background:rgba(255,255,255,0.1);
}

/* ===== MAIN ===== */
.main-section {
  margin-left:280px;
  padding:30px;
  width:100%;
}

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:var(--card-shadow);
  border-left:5px solid gray;
}

.card.pending { border-left-color: orange; }
.card.progress { border-left-color: blue; }
.card.resolved { border-left-color: green; }

.header {
  display:flex;
  justify-content:space-between;
}

.badge {
  padding:4px 10px;
  border-radius:6px;
  color:white;
}

.badge.pending { background:orange; }
.badge.progress { background:blue; }
.badge.resolved { background:green; }

.new {
  background:red;
  color:white;
  padding:2px 6px;
  font-size:10px;
  border-radius:4px;
  margin-left:5px;
}

.desc {
  margin:10px 0;
}

select {
  padding:5px;
}

button {
  padding:6px 10px;
  background:var(--primary-color);
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <h2>Warden ID: <span id="wardenId"></span></h2>

  <ul class="menu">
    <li><a href="warden_dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
    <li class="active"><a href="#"><i class="fas fa-tools"></i> Complaints</a></li>
    <li><button onclick="logout()">Logout</button></li>
  </ul>
</div>

<!-- ===== MAIN ===== -->
<div class="main-section">

  <h2>🏨 Hostel Complaints</h2>

  <div id="complaintsContainer"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.20/dist/sweetalert2.all.min.js"></script>

<script>

/* ===== BASE URL SAME AS YOUR FILE ===== */
const BASE_URL = window.location.hostname === "localhost"
  ? "http://localhost:3001"
  : "https://hostels.sircrrcoestd.in";

/* ===== GET USER FROM LOCAL STORAGE ===== */
const wardenId = localStorage.getItem("user_id");

if (!wardenId) {
  window.location.href = "login.html";
}

document.getElementById("wardenId").innerText = wardenId;


/* ===== LOAD COMPLAINTS ===== */
async function loadComplaints() {
  const res = await fetch(`${BASE_URL}/api/warden/complaints?warden_id=${wardenId}`);
  const data = await res.json();

  const container = document.getElementById("complaintsContainer");
  container.innerHTML = "";

  data.complaints.forEach(c => {

    let statusClass = "";
    if (c.status === "Pending") statusClass = "pending";
    if (c.status === "In Progress") statusClass = "progress";
    if (c.status === "Resolved") statusClass = "resolved";

    const card = document.createElement("div");
    card.className = `card ${statusClass}`;

    card.innerHTML = `
      <div class="header">
        <b>${c.student_name} (${c.user_id})</b>
        <span class="badge ${statusClass}">${c.status}</span>
      </div>

      <small>
        📍 ${c.location} | 🏢 ${c.block_name} - ${c.room_number}
      </small>

      <div class="desc">${c.description}</div>

      <div>
        <select onchange="updateStatus(${c.id}, this.value)">
          <option ${c.status==='Pending'?'selected':''}>Pending</option>
          <option ${c.status==='In Progress'?'selected':''}>In Progress</option>
          <option ${c.status==='Resolved'?'selected':''}>Resolved</option>
        </select>

        <button onclick="markViewed(${c.id})">Viewed</button>
      </div>
    `;

    container.appendChild(card);
  });
}


/* ===== UPDATE STATUS ===== */
async function updateStatus(id, status) {
  await fetch(`${BASE_URL}/api/warden/complaints/status/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  Swal.fire("Updated!", "Status updated successfully", "success");
  loadComplaints();
}


/* ===== MARK VIEWED ===== */
async function markViewed(id) {
  await fetch(`${BASE_URL}/api/warden/complaints/view/${id}`, {
    method: "PUT"
  });

  loadComplaints();
}


/* ===== LOGOUT SAME STYLE ===== */
function logout() {
  Swal.fire({
    title: 'Logout?',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'Yes'
  }).then((result) => {
    if (result.isConfirmed) {
      localStorage.clear();
      window.location.href = "login.html";
    }
  });
}


/* ===== INIT ===== */
loadComplaints();

</script>

</body>
</html>
