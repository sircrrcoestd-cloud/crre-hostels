<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warden Complaints</title>
</head>

<body>

<h2>Hostel Complaints</h2>

<div id="complaintsContainer"></div>

<script>

// ✅ Get warden ID
const wardenId = localStorage.getItem("user_id");

if (!wardenId) {
  alert("Login required");
  window.location.href = "login.html";
}

// ✅ Load complaints
async function loadComplaints() {
  try {
    const res = await fetch(`/api/warden/complaints?warden_id=${wardenId}`);
    const data = await res.json();

    console.log("API:", data);

    const container = document.getElementById("complaintsContainer");
    container.innerHTML = "";

    // ✅ Handle error safely
    if (!data.success) {
      container.innerHTML = `<p>Error: ${data.error}</p>`;
      return;
    }

    if (!data.complaints || data.complaints.length === 0) {
      container.innerHTML = "<p>No complaints found</p>";
      return;
    }

    // ✅ Display complaints
    data.complaints.forEach(c => {

      const div = document.createElement("div");
      div.style.border = "1px solid black";
      div.style.margin = "10px";
      div.style.padding = "10px";

      div.innerHTML = `
        <p><b>Student:</b> ${c.student_name} (${c.user_id})</p>
        <p><b>Category:</b> ${c.category}</p>
        <p><b>Location:</b> ${c.location}</p>
        <p><b>Description:</b> ${c.description}</p>
        <p><b>Status:</b> ${c.status}</p>

        <select onchange="updateStatus(${c.id}, this.value)">
          <option ${c.status==='Pending'?'selected':''}>Pending</option>
          <option ${c.status==='In Progress'?'selected':''}>In Progress</option>
          <option ${c.status==='Resolved'?'selected':''}>Resolved</option>
        </select>

        <button onclick="markViewed(${c.id})">Mark Viewed</button>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    document.getElementById("complaintsContainer").innerHTML =
      "<p>Server error</p>";
  }
}


// ✅ Update status
async function updateStatus(id, status) {
  await fetch(`/api/warden/complaints/status/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  alert("Status updated");
  loadComplaints();
}


// ✅ Mark viewed
async function markViewed(id) {
  await fetch(`/api/warden/complaints/view/${id}`, {
    method: "PUT"
  });

  loadComplaints();
}


// 🚀 Start
loadComplaints();

</script>

</body>
</html>
