<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warden Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef2f7;
}

/* Topbar */
.topbar {
    background: #0b1c3c;
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
}

/* Grid Layout */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Card */
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
    cursor: pointer;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
}

.red { color: red; }
.green { color: green; }

/* Filter bar */
.filter-bar {
    padding: 15px;
    text-align: center;
}
select, button {
    padding: 10px;
    margin: 5px;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}
.modal-content {
    background: white;
    margin: 5% auto;
    padding: 20px;
    width: 80%;
    max-height: 80%;
    overflow-y: auto;
    border-radius: 10px;
}
.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>Warden Dashboard</h2>
</div>

<!-- FILTER + DOWNLOAD -->
<div class="filter-bar">
    <select id="yearFilter">
        <option value="ALL">All Years</option>
        <option value="1">1st Year</option>
        <option value="2">2nd Year</option>
        <option value="3">3rd Year</option>
        <option value="4">4th Year</option>
    </select>
    <select id="branchFilter">
    <option value="ALL">All Branches</option>
</select>

    <button onclick="applyFilter()">Filter</button>
    <button onclick="downloadPDF()">Download Backlog PDF</button>
</div>

<!-- STUDENT GRID -->
<div class="grid" id="studentGrid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
let allStudents = [];

// ✅ LOAD DATA
window.onload = () => {
    loadStudents();
    loadBranches();
};

async function loadStudents() {
    const userId = localStorage.getItem("user_id");

    const year = document.getElementById("yearFilter").value;
    const branch = document.getElementById("branchFilter").value;

    const url = `/api/hostel/students?year=${year}&branch=${branch}`;

    const res = await fetch(url, {
        headers: { "x-user-id": userId }
    });

    const data = await res.json();

    if (!Array.isArray(data)) {
        alert(data.message);
        return;
    }

    allStudents = data;
    renderStudents(data);
}

// ✅ RENDER GRID
function renderStudents(data) {
    const grid = document.getElementById("studentGrid");
    grid.innerHTML = "";

    data.forEach(s => {

        const card = document.createElement("div");
        card.className = "card";

        card.onclick = () => showDetails(s);

        card.innerHTML = `
            <img src="${s.photo_url || 'https://via.placeholder.com/60'}">
            <h3>${s.name}</h3>
            <p>${s.reg_no}</p>
            <p>${s.course}</p>
            <p class="${s.backlogs > 0 ? 'red' : 'green'}">
                Backlogs: ${s.backlogs}
            </p>
        `;

        grid.appendChild(card);
    });
}


// ✅ FILTER
function applyFilter() {
    loadStudents(); // only backend filtering
}

// ✅ MODAL DETAILS (ALL DATA)
async function showDetails(s) {

    const userId = localStorage.getItem("user_id");

    const res = await fetch(`/api/hostel/student/${s.reg_no}`, {
        headers: {
            "x-user-id": userId
        }
    });

    const data = await res.json();

    if (!data || data.message) {
        alert(data.message || "Error loading details");
        return;
    }

    const modal = document.getElementById("modal");
    const content = document.getElementById("modalContent");

    content.innerHTML = `
        <h2>${data.name}</h2>

        <p><b>Reg No:</b> ${data.reg_no}</p>
        <p><b>User ID:</b> ${data.userId}</p>
        <p><b>Course:</b> ${data.course}</p>
        <p><b>Year:</b> ${data.year}</p>
        <p><b>Semester:</b> ${data.semester}</p>
        <p><b>Section:</b> ${data.section}</p>

        <hr>

        <p><b>Mobile:</b> ${data.mobile_no}</p>
        <p><b>Email:</b> ${data.email}</p>
        <p><b>Aadhar:</b> ${data.aadhar_no}</p>
        <p><b>APAAR ID:</b> ${data.apaar_id}</p>

        <hr>

        <p><b>Father Name:</b> ${data.father_name}</p>
        <p><b>Father Mobile:</b> ${data.father_mobile}</p>

        <hr>

        <p><b>Address:</b> ${data.address}</p>
        <p><b>Village:</b> ${data.village}</p>
        <p><b>Mandal:</b> ${data.mandal}</p>
        <p><b>District:</b> ${data.district}</p>
        <p><b>State:</b> ${data.state}</p>
        <p><b>Pincode:</b> ${data.pincode}</p>

        <hr>

        <p><b>Counsellor:</b> ${data.counsellor_name}</p>
        <p><b>Counsellor Mobile:</b> ${data.counsellor_mobile}</p>

        <hr>

        <p><b>Joining Date:</b> ${data.joining_date}</p>
        <p><b>Admission Type:</b> ${data.admission_type}</p>
        <p><b>Residence:</b> ${data.residence_type}</p>

        <hr>

        <h3 style="color:${data.backlogs > 0 ? 'red' : 'green'}">
            Backlogs: ${data.backlogs}
        </h3>
    `;

    modal.style.display = "block";
}
// CLOSE MODAL
function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// CLOSE ON OUTSIDE CLICK
window.onclick = function(e) {
    if (e.target.id === "modal") closeModal();
}

function downloadPDF() {
    const userId = localStorage.getItem("user_id");
    const year = document.getElementById("yearFilter").value;
    const branch = document.getElementById("branchFilter").value;

    const url = `/api/hostel/download-pdf?year=${year}&branch=${branch}`;

    fetch(url, {
        headers: {
            "x-user-id": userId
        }
    })
    .then(res => res.blob())
    .then(blob => {
        const link = document.createElement("a");
        link.href = window.URL.createObjectURL(blob);
        link.download = "backlog_report.pdf";
        link.click();
    });
}


async function loadBranches() {
    const userId = localStorage.getItem("user_id");

    const res = await fetch("/api/hostel/branches", {
        headers: { "x-user-id": userId }
    });

    const data = await res.json();

    const select = document.getElementById("branchFilter");

    // ✅ CLEAR OLD OPTIONS
    select.innerHTML = `<option value="ALL">All Branches</option>`;

    data.forEach(b => {
        const option = document.createElement("option");
        option.value = b.course;
        option.textContent = b.course;
        select.appendChild(option);
    });
}

</script>

</body>
</html>
