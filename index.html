<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #eef2f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.login-box {
    background: #fff;
    padding: 30px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}
h2 {
    text-align: center;
}
label {
    font-weight: bold;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0 15px;
}
button {
    width: 100%;
    padding: 12px;
    background: #007bff;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}
button:hover {
    background: #0056b3;
}
.error {
    color: red;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<form id="loginForm">
    <label>User ID</label>
    <input type="text" name="user_id" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit">Login</button>
</form>

<div class="error" id="errorMsg"></div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const user_id = this.user_id.value.trim();
    const password = this.password.value.trim();

    const errorBox = document.getElementById("errorMsg");
    errorBox.innerText = "";

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id, password })
        });

        const data = await res.json();

        // ❌ Invalid login
        if (!data.success) {
            errorBox.innerText = data.message || "Login failed";
            return;
        }

        // ✅ CLEAR OLD DATA
        localStorage.clear();

        // ✅ STORE USER INFO
        localStorage.setItem("user_id", data.user_id);
        localStorage.setItem("role", data.role);

        console.log("Logged in:", data.user_id, data.role);

        // ✅ REDIRECT BASED ON ROLE
        if (data.role === "student") {
            window.location.href = "student_dashboard.html";
        } 
        else if (data.role === "warden") {
            window.location.href = "warden_dashboard.html";
        } 
        else if (data.role === "admin") {
            window.location.href = "admin_dashboard.html";
        } 
        else {
            errorBox.innerText = "Unknown role";
        }

    } catch (err) {
        console.error("Login error:", err);
        errorBox.innerText = "Server error. Please try again.";
    }
});
</script>

</body>
</html>
