<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hostel Fee Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
}

.year-card {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 12px;
}

.fee-card {
    background: #334155;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    padding: 8px 14px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:disabled {
    background: gray;
    cursor: not-allowed;
}

.paid {
    color: #22c55e;
}

.pending {
    color: #facc15;
}
</style>
</head>

<body>

<div class="container">
    <h2>Hostel Fee Dashboard</h2>
    <div id="fees"></div>
</div>

<script>
const BASE_URL = window.location.hostname === "localhost"
  ? "http://localhost:3000"
  : "https://crrehostel.onrender.com";

const user_id = localStorage.getItem("user_id");

if (!user_id) {
    alert("Please login first");
    window.location.href = "index.html";
}

// ==============================
// LOAD FEES (YEAR-WISE)
// ==============================
async function loadFees() {
    try {
        const res = await fetch(`${BASE_URL}/api/getFees/${user_id}`);
        const data = await res.json();

        const container = document.getElementById("fees");
        container.innerHTML = "";

        if (!data.length) {
            container.innerHTML = "<p>No fee data available</p>";
            return;
        }

        data.forEach(yearData => {

            const yearDiv = document.createElement("div");
            yearDiv.className = "year-card";

            yearDiv.innerHTML = `
                <h3>Year ${yearData.year} (${yearData.academic_year || ""})</h3>
            `;

            yearData.fees.forEach(fee => {

                const isPaid = fee.pending <= 0;

                const feeDiv = document.createElement("div");
                feeDiv.className = "fee-card";

                feeDiv.innerHTML = `
                    <div>
                        <h4>${fee.type}</h4>
                        <p>Total: ₹${fee.total}</p>
                        <p class="${isPaid ? 'paid' : 'pending'}">
                            Paid: ₹${fee.paid} | Pending: ₹${fee.pending}
                        </p>
                    </div>

                    <button 
                        onclick="pay('${fee.type}', ${fee.pending})"
                        ${isPaid ? "disabled" : ""}
                    >
                        ${isPaid ? "Paid" : "Pay"}
                    </button>
                `;

                yearDiv.appendChild(feeDiv);
            });

            container.appendChild(yearDiv);
        });

    } catch (err) {
        console.error("Error loading fees:", err);
        alert("Failed to load fees");
    }
}

// ==============================
// PAYMENT FUNCTION
// ==============================
function pay(type, amount) {

    if (!amount || amount <= 0) {
        alert("Nothing to pay");
        return;
    }

    // 🔹 UPI link
    const upi = `upi://pay?pa=hostel@upi&pn=CRRHostel&am=${amount}&cu=INR`;

    // 🔹 Open payment
    window.location.href = upi;

    // 🔹 Ask txn ID after payment
    setTimeout(() => {

        const txn = prompt("Enter Transaction ID");

        if (!txn) {
            alert("Transaction ID required");
            return;
        }

        fetch(`${BASE_URL}/api/addTransaction`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                user_id,
                fee_type: type,
                amount,
                transaction_id: txn
            })
        })
        .then(res => res.json())
        .then(data => {

            if (data.error) {
                alert(data.error);
                return;
            }

            alert("Transaction submitted (Waiting for verification)");
            loadFees();
        })
        .catch(err => {
            console.error(err);
            alert("Transaction failed");
        });

    }, 3000);
}

// ==============================
// INIT
// ==============================
loadFees();
</script>

</body>
</html>
