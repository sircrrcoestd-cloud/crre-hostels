<!DOCTYPE html>
<html>
<head>
<title>Fee Structure</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>

</head>
<body>

<div class="container">
<h2>Apply Fee Structure (Year Promotion)</h2>

<label>Promotion</label>
<select id="promotion">
  <option value="1-2">1 → 2 (First to Second)</option>
  <option value="2-3">2 → 3 (Second to Third)</option>
  <option value="3-4">3 → 4 (Third to Final)</option>
</select>

<label>Academic Year</label>
<input type="text" id="academic_year" placeholder="2025-2026">

<label>Residence</label>
<select id="type">
  <option value="BOYS_HOSTEL">Boys Hostel</option>
  <option value="GIRLS_HOSTEL">Girls Hostel</option>
</select>

<label>Room Rent</label>
<input type="number" id="rent">

<label>Mess Deposit 1</label>
<input type="number" id="m1">

<label>Mess Deposit 2</label>
<input type="number" id="m2">

<button onclick="applyFee()">Apply Fee</button>

</div>

<script>
async function applyFee() {

    const promotion = document.getElementById("promotion").value;
    const [current_year, next_year] = promotion.split("-");

    const data = {
        current_year,
        next_year,
        academic_year: document.getElementById("academic_year").value,
        residence_type: document.getElementById("type").value,
        room_rent: document.getElementById("rent").value,
        mess1: document.getElementById("m1").value,
        mess2: document.getElementById("m2").value
    };

    const res = await fetch("/apply-fee-structure", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();
    alert(result.message);
}
</script>

</body>
</html>
